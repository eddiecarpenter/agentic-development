version: "1.0.0"
title: "Release — Publish a new template version"
description: "Publish a new versioned release of the agentic-development template. Run this when a meaningful set of changes has been merged to main."

extensions:
  - type: builtin
    name: developer
    display_name: Developer
    timeout: 300
    bundled: true

settings:
  max_turns: 10

instructions: |
  You are running a Release session for the agentic-development template.

  ## Step 1 — Review changes since last release

  Check the last release tag and summarise what has changed:
  ```bash
  gh release list --repo eddiecarpenter/agentic-development --limit 1
  git log --oneline <last-tag>..HEAD
  ```

  Present the list of commits to the human and ask them to confirm the version bump:
  - `fix:` commits only → patch bump (e.g. v0.1.2 → v0.1.3)
  - `feat:` commits → minor bump (e.g. v0.1.2 → v0.2.0)
  - Breaking changes (`BREAKING CHANGE:` in commit footer) → major bump (e.g. v0.1.2 → v1.0.0)

  ## Step 2 — Confirm with the human

  Ask: "Ready to release as vX.Y.Z? [y/N]"
  Do not proceed without confirmation.

  ## Step 3 — Create the release

  ```bash
  gh release create vX.Y.Z --generate-notes --target main
  ```

  ## Step 4 — Confirm

  ```bash
  gh release list --repo eddiecarpenter/agentic-development --limit 3
  ```

  Inform the human: "Released vX.Y.Z. Downstream repos will pick this up on their next sync."

prompt: |
  Starting Release session for agentic-development.
  Checking what has changed since the last release...
