version: "1.0.0"
title: "Release"
description: "Generates AI release notes from git history since the previous tag and creates the GitHub release."

parameters:
  - key: tag
    input_type: string
    requirement: required
    description: "The release tag that was just pushed (e.g. v0.8.0)"

  - key: repo
    input_type: string
    requirement: required
    description: "Repository in owner/name format (e.g. eddiecarpenter/ai-native-delivery)"

extensions:
  - type: builtin
    name: developer
    display_name: Developer
    timeout: 120
    bundled: true

settings:
  max_turns: 20

instructions: |
  You are running a Release session. Your job is to generate human-readable release
  notes from git commit history and create the GitHub release for tag {{ tag }}.

  Read base/skills/release-notes.md before writing anything — it defines the format,
  writing style, and what to omit.

  ## Step 1 — Determine the Previous Tag

  List all tags sorted by version, excluding the current tag:
    git tag --sort=-version:refname | grep -v "^{{ tag }}$" | head -1

  Store this as PREV_TAG. If no previous tag exists, the release covers the full
  commit history.

  ## Step 2 — Collect Commits

  Get all commits since the previous tag:

    If PREV_TAG exists:
      git log --pretty=format:"%s (%h)" ${PREV_TAG}..HEAD

    If no PREV_TAG:
      git log --pretty=format:"%s (%h)"

  Review the commits carefully. Read changed files if a commit message is ambiguous.

  ## Step 3 — Generate Release Notes

  Following the guidance in base/skills/release-notes.md:

  1. Write a one-sentence summary of what this release delivers overall
  2. Categorise each meaningful commit into Features, Fixes, Documentation, or Chores
  3. Omit noise: merge commits, automated version bumps, CI-only changes
  4. For this framework repo specifically: flag any changes that require downstream
     action (new secrets, changed rules, renamed skills, breaking changes)

  Write the release notes to /tmp/release-notes.md

  ## Step 4 — Create the GitHub Release

    gh release create {{ tag }} \
      --repo {{ repo }} \
      --title "Release {{ tag }}" \
      --notes-file /tmp/release-notes.md

  ## Step 5 — Report

  Output the release URL and a brief summary of what was included.

  ## Rules

  - Do not push any commits or branches
  - Do not modify any source files
  - If gh release create fails because the release already exists, report and exit cleanly

prompt: |
  Release session starting for {{ tag }} in {{ repo }}.
  Reading commit history since previous tag, generating release notes, creating GitHub release.
