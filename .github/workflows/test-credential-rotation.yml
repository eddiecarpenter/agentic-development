name: POC — Credential Rotation Test

on:
  workflow_dispatch:

jobs:
  test-rotation:
    name: Test Claude Code credential rotation
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Restore Claude Code auth
        run: |
          mkdir -p ~/.claude
          echo "${{ secrets.CLAUDE_CREDENTIALS_JSON }}" | base64 -d > ~/.claude/.credentials.json
          chmod 0600 ~/.claude/.credentials.json

      - name: Test credential rotation
        env:
          GH_TOKEN: ${{ secrets.GOOSE_AGENT_PAT }}
        run: |
          if [ ! -s ~/.claude/.credentials.json ]; then
            echo "ERROR: credentials file is empty or missing"
            exit 1
          fi

          echo "=== Before ==="
          CREDS_BEFORE=$(sha256sum ~/.claude/.credentials.json | cut -d' ' -f1)
          echo "Checksum: ${CREDS_BEFORE}"

          echo ""
          echo "=== Running claude -p 'hi' ==="
          claude -p "hi" || {
            echo "ERROR: claude -p 'hi' failed — session may be revoked"
            exit 1
          }

          echo ""
          echo "=== After ==="
          CREDS_AFTER=$(sha256sum ~/.claude/.credentials.json | cut -d' ' -f1)
          echo "Checksum: ${CREDS_AFTER}"

          echo ""
          if [ "$CREDS_BEFORE" != "$CREDS_AFTER" ]; then
            echo "✓ Credentials were rotated"
            echo "Attempting to update CLAUDE_CREDENTIALS_JSON secret..."
            gh secret set CLAUDE_CREDENTIALS_JSON \
              --repo "${GITHUB_REPOSITORY}" \
              --body "$(cat ~/.claude/.credentials.json | base64 | tr -d '\n')" \
              && echo "✓ Secret updated successfully" \
              || echo "✗ Secret update failed — PAT may lack secrets write permission"
          else
            echo "— Credentials unchanged (no rotation occurred)"
            echo "Attempting gh secret set anyway to verify PAT permissions..."
            gh secret set CLAUDE_CREDENTIALS_JSON \
              --repo "${GITHUB_REPOSITORY}" \
              --body "$(cat ~/.claude/.credentials.json | base64 | tr -d '\n')" \
              && echo "✓ Secret write permission confirmed" \
              || echo "✗ Secret update failed — PAT lacks secrets write permission"
          fi
